# 자동화 태스크 설정 파일
# 환경변수: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID 필요

telegram:
  # GitHub Secrets에서 관리
  # TELEGRAM_BOT_TOKEN: 봇 토큰
  # TELEGRAM_CHAT_ID: 수신할 채팅 ID

# 워치리스트
watchlist:
  # 기본 운영은 Google Sheets "웹에 게시" CSV 링크 사용
  # local_csv 또는 published_csv
  source_type: "published_csv"
  # GitHub Actions env / local shell env 에서 읽을 변수명
  published_csv_env_var: "WATCHLIST_PUBLISHED_CSV_URL"
  # 필요하면 로컬 설정값으로도 넣을 수 있지만, 운영은 env 사용 권장
  published_csv_url: ""
  # source_type=local_csv 일 때만 사용하는 경로 (repo root 기준)
  local_csv_path: "data/watchlist.csv"

# 태스크1: 관심 종목 뉴스 모니터링
stock_news:
  # 평일은 08/18시, 주말은 08시 1회 실행
  weekday_schedule_hours_kst: [8, 18]
  weekend_schedule_hours_kst: [8]
  # 스케줄 시각 직후 실행은 "현재 슬롯"으로 보고 직전 슬롯부터 조회
  schedule_trigger_grace_minutes: 60
  # 스케줄 경계 누락 방지를 위한 조회 겹침 시간
  schedule_overlap_minutes: 30
  # Marketaux 기반 최근 뉴스 조회 시간 범위
  lookback_hours: 3
  # 무료 플랜 사용량을 아끼기 위해 여러 종목을 배치 조회
  batch_size: 20
  # 종목별로 메시지에 보여줄 최대 기사 수
  per_symbol_article_limit: 2
  # Marketaux 배치 요청당 최대 기사 수
  max_articles_per_batch: 50
  hada:
    enabled: true
    lookback_hours: 6
    max_entries: 30
    per_symbol_article_limit: 1

# 태스크2: 종목 가격 변동 알림
stock_price:
  # watchlist 개별 종목에 threshold가 없을 때 쓰는 기본값
  default_threshold_pct: 3.0
  # TWELVE_DATA_API_KEY: Twelve Data API 키
  # 일부 한국 종목은 무료 플랜에서 제한될 수 있어 row 단위 provider 선택을 권장

# 태스크1에 병합된 기술 뉴스 (LLM 요약)
tech_news:
  merge_into_stock_task:
    enabled: true
    dispatch_hour_kst: 8
    per_source_limit: 5
  sources:
    - { name: "GeekNews", url: "https://news.hada.io/new" }
    - { name: "PyTorch Korea", url: "https://discuss.pytorch.kr/c/news/14" }

# 태스크5: 오늘의 할일 알림 (Todoist)
todoist:
  # TODOIST_API_TOKEN: Todoist 설정 > 연동 > API 토큰
  # GitHub Secrets에서 관리

# 태스크6: 생일 알림
birthdays:
  # data/birthdays.yaml에서 관리

# 태스크7: 채용공고 모니터링
job_monitor:
  sources:
    - { name: "wanted", keywords: ["AI 엔지니어", "ML 엔지니어", "LLM"], size: 20, max_results: 5, sort: "latest", today_only: true }
    - { name: "hada", keywords: ["AI Engineer", "ML Engineer"] }
    - name: "zighang"
      label: "직행 AI/LLM"
      page: 0
      size: 20
      max_results: 5
      today_only: true
      depth_twos: ["LLM", "RAG", "생성형AI", "NLP", "AI서비스기획", "기타AI_데이터"]
      career_min: 0
      career_max: 10
      include_career_open: true
      sort_condition: "LATEST"
      order_condition: "DESC"
    - name: "cleaneye"
      label: "클린아이 공공채용"
      ent_recruit_list: ["700020"]
      today_only: true
      max_results: 5
      yearincome: ""
      status: ""
      pub_end_date: ""
      ent_name: ""

# 태스크8: 블로그 크로스포스팅 (Dev.to)
blog_crosspost:
  # DEVTO_API_KEY: Dev.to 설정 > Extensions > DEV Community API Keys
  # BLOG_BASE_URL: Hugo 블로그 URL (canonical URL용, GitHub vars에서 관리)
