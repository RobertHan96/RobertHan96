# 자동화 태스크 설정 파일
# 환경변수: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID 필요

telegram:
  # GitHub Secrets에서 관리
  # TELEGRAM_BOT_TOKEN: 봇 토큰
  # TELEGRAM_CHAT_ID: 수신할 채팅 ID

# 태스크1: 관심 종목 뉴스 모니터링
stock_news:
  keywords:
    - "삼성전자"
    - "SK하이닉스"
    - "NVIDIA"
    - "Tesla"
    # TODO: 관심 종목 추가

# 태스크2: 종목 가격 변동 알림
stock_price:
  threshold_pct: 3.0
  kr_stocks:
    - { symbol: "005930", name: "삼성전자" }
    - { symbol: "000660", name: "SK하이닉스" }
    # TODO: 관심 종목 추가
  us_stocks:
    - { symbol: "NVDA", name: "NVIDIA" }
    - { symbol: "TSLA", name: "Tesla" }
    # TODO: 관심 종목 추가

# 태스크3: 기술 뉴스 (LLM 요약)
tech_news:
  sources:
    - { name: "GeekNews", url: "https://news.hada.io/new" }
    - { name: "PyTorch Korea", url: "https://discuss.pytorch.kr/c/news/14" }

# 태스크5: 오늘의 할일 알림 (Todoist)
todoist:
  # TODOIST_API_TOKEN: Todoist 설정 > 연동 > API 토큰
  # GitHub Secrets에서 관리

# 태스크6: 생일 알림
birthdays:
  # data/birthdays.yaml에서 관리

# 태스크7: 채용공고 모니터링
job_monitor:
  sources:
    - { name: "wanted", keywords: ["AI 엔지니어", "ML 엔지니어", "LLM"] }
    - { name: "hada", keywords: ["AI Engineer", "ML Engineer"] }

# 태스크8: 블로그 크로스포스팅 (Dev.to)
blog_crosspost:
  # DEVTO_API_KEY: Dev.to 설정 > Extensions > DEV Community API Keys
  # BLOG_BASE_URL: Hugo 블로그 URL (canonical URL용, GitHub vars에서 관리)
