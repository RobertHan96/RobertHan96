name: "태스크7-1: 채용공고 Fit 리포트"

on:
  schedule:
    # 매일 10:20 KST = UTC 01:20
    - cron: "20 1 * * *"
  workflow_dispatch:

jobs:
  job-fit-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r jobs/requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run job fit monitor
        env:
          JOB_MONITOR_REPORT_DIR: ${{ github.workspace }}/jobs/reports
        run: |
          python -m jobs.run_job_monitor \
            --limit-per-site 20 \
            --detail-top-n 8 \
            --min-score 20 \
            --report-limit 10

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-fit-monitor-reports
          path: jobs/reports/*.md
          if-no-files-found: warn
          retention-days: 14
