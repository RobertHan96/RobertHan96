name: "태스크7-1: 채용공고 Fit 리포트"

on:
  schedule:
    # 매일 10:20 KST = UTC 01:20
    - cron: "20 1 * * *"
  workflow_dispatch:

jobs:
  job-fit-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r jobs/requirements.txt

      - name: Install Playwright Chromium
        run: |
          scripts/automation/install_playwright_chromium.sh

      - name: Run job fit monitor
        env:
          JOB_MONITOR_REPORT_DIR: ${{ github.workspace }}/jobs/reports
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_FIT_REPORT_BRIDGE_URL: ${{ vars.JOB_FIT_REPORT_BRIDGE_URL }}
          TELEGRAM_MEMORY_BRIDGE_URL: ${{ vars.TELEGRAM_MEMORY_BRIDGE_URL }}
          JOB_FIT_REPORT_BRIDGE_TOKEN: ${{ secrets.JOB_FIT_REPORT_BRIDGE_TOKEN }}
          TELEGRAM_MEMORY_BRIDGE_TOKEN: ${{ secrets.TELEGRAM_MEMORY_BRIDGE_TOKEN }}
          TELEGRAM_MEMORY_SOURCE: "job-fit-monitor"
        run: |
          python -m jobs.run_job_monitor \
            --limit-per-site 20 \
            --detail-top-n 8 \
            --min-score 70 \
            --report-limit 10 \
            --upload-report \
            --notify-high-fit-titles \
            --notify-min-score 80 \
            --notify-limit 5
