name: "텔레그램 메모리 요약"

on:
  schedule:
    # 매일 00:10 KST = UTC 15:10 (전일 요약)
    - cron: "10 15 * * *"
  workflow_dispatch:

jobs:
  telegram-memory-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Build daily telegram memory summary
        working-directory: scripts/automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          TELEGRAM_MEMORY_BRIDGE_URL: ${{ vars.TELEGRAM_MEMORY_BRIDGE_URL }}
          TELEGRAM_MEMORY_BRIDGE_TOKEN: ${{ secrets.TELEGRAM_MEMORY_BRIDGE_TOKEN }}
        run: python telegram_memory_maintenance.py --yesterday
