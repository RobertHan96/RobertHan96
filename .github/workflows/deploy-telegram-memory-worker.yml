name: "Deploy Telegram Memory Worker"

"on":
  push:
    branches:
      - main
    paths:
      - "services/cloudflare-telegram-bridge/**"
      - ".github/workflows/deploy-telegram-memory-worker.yml"
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required Cloudflare config
        id: config
        env:
          CLOUDFLARE_TELEGRAM_MEMORY_KV_ID: ${{ vars.CLOUDFLARE_TELEGRAM_MEMORY_KV_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=()

          test -n "$CLOUDFLARE_TELEGRAM_MEMORY_KV_ID" || missing+=("CLOUDFLARE_TELEGRAM_MEMORY_KV_ID")
          test -n "$CLOUDFLARE_ACCOUNT_ID" || missing+=("CLOUDFLARE_ACCOUNT_ID")
          test -n "$CLOUDFLARE_API_TOKEN" || missing+=("CLOUDFLARE_API_TOKEN")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=$(printf '%s ' "${missing[@]}" | sed 's/ $//')" >> "$GITHUB_OUTPUT"
            echo "::warning title=Cloudflare deploy skipped::Missing config: $(printf '%s ' "${missing[@]}" | sed 's/ $//')"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "missing=" >> "$GITHUB_OUTPUT"

      - name: Generate Wrangler config for CI deploy
        if: steps.config.outputs.ready == 'true'
        working-directory: services/cloudflare-telegram-bridge
        env:
          CLOUDFLARE_TELEGRAM_MEMORY_KV_ID: ${{ vars.CLOUDFLARE_TELEGRAM_MEMORY_KV_ID }}
        run: |
          sed "s/__CLOUDFLARE_TELEGRAM_MEMORY_KV_ID__/${CLOUDFLARE_TELEGRAM_MEMORY_KV_ID}/g" \
            wrangler.ci.toml.template > wrangler.ci.toml

      - name: Deploy Worker
        if: steps.config.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "services/cloudflare-telegram-bridge"
          command: deploy --config wrangler.ci.toml

      - name: Skip summary
        if: steps.config.outputs.ready != 'true'
        run: |
          echo "Cloudflare Worker deploy skipped."
          echo "Missing config: ${{ steps.config.outputs.missing }}"
