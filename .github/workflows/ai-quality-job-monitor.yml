name: "태스크7-2: AI 품질 채용공고 즉시 알림"

on:
  schedule:
    # 09:15, 13:15, 17:15, 21:15 KST
    - cron: "15 0,4,8,12 * * *"
  workflow_dispatch:
    inputs:
      ignore_seen:
        description: "기존 고적합 발송 이력을 무시하고 즉시 알림 테스트"
        required: false
        default: true
        type: boolean

jobs:
  ai-quality-job-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r jobs/requirements.txt

      - name: Install Playwright Chromium
        run: |
          scripts/automation/install_playwright_chromium.sh

      - name: Run AI quality immediate monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MEMORY_BRIDGE_URL: ${{ vars.TELEGRAM_MEMORY_BRIDGE_URL }}
          TELEGRAM_MEMORY_BRIDGE_TOKEN: ${{ secrets.TELEGRAM_MEMORY_BRIDGE_TOKEN }}
          JOB_FIT_REPORT_BRIDGE_URL: ${{ vars.JOB_FIT_REPORT_BRIDGE_URL }}
          JOB_FIT_REPORT_BRIDGE_TOKEN: ${{ secrets.JOB_FIT_REPORT_BRIDGE_TOKEN }}
          TELEGRAM_MEMORY_SOURCE: "ai-quality-job-monitor"
          WORKFLOW_IGNORE_SEEN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ignore_seen || 'false' }}
        run: |
          EXTRA_ARGS=""
          if [ "$WORKFLOW_IGNORE_SEEN" = "true" ]; then
            EXTRA_ARGS="--ignore-seen"
            echo "workflow_dispatch 테스트 모드: seen 상태를 무시합니다."
          fi
          python -m jobs.run_ai_quality_job_monitor \
            --mode immediate \
            --limit-per-site 20 \
            --detail-top-n 12 \
            --min-score 60 \
            --high-fit-score 65 \
            --summary-score 60 \
            --notify-limit 5 \
            $EXTRA_ARGS
