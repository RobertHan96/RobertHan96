name: "텔레그램 메모리 인입/질의응답"

on:
  repository_dispatch:
    types: [telegram-memory-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  telegram-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Process Telegram event
        working-directory: scripts/automation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_MEMORY_MODEL: ${{ vars.TELEGRAM_MEMORY_MODEL }}
        run: python telegram_memory_event.py

      - name: Commit telegram memory
        if: always()
        run: bash scripts/automation/commit_telegram_memory.sh "data/telegram_memory" "Update telegram memory"
