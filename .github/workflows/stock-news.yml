name: "태스크1: 관심 종목 뉴스 모니터링"

on:
  schedule:
    # 매일 08:00 KST = UTC 23:00 (전일)
    - cron: "0 23 * * *"
    # 평일만 18:00 KST = UTC 09:00
    - cron: "0 9 * * 1-5"
  workflow_dispatch: # 수동 실행용

permissions:
  contents: write

jobs:
  stock-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Run stock news monitor
        working-directory: scripts/automation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          WATCHLIST_PUBLISHED_CSV_URL: ${{ vars.WATCHLIST_PUBLISHED_CSV_URL }}
          TELEGRAM_MEMORY_BRIDGE_URL: ${{ vars.TELEGRAM_MEMORY_BRIDGE_URL }}
          TELEGRAM_MEMORY_BRIDGE_TOKEN: ${{ secrets.TELEGRAM_MEMORY_BRIDGE_TOKEN }}
          TELEGRAM_MEMORY_SOURCE: "stock-news"
        run: python stock_news.py
