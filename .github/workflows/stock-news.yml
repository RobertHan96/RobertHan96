name: "태스크1: 관심 종목 뉴스 모니터링"

on:
  schedule:
    # 매 2시간 (08~22시 KST = UTC-9 → 23,01,03,05,07,09,11,13)
    - cron: "0 23,1,3,5,7,9,11,13 * * *"
  workflow_dispatch: # 수동 실행용

jobs:
  stock-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Run stock news monitor
        working-directory: scripts/automation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          WATCHLIST_PUBLISHED_CSV_URL: ${{ vars.WATCHLIST_PUBLISHED_CSV_URL }}
        run: python stock_news.py
