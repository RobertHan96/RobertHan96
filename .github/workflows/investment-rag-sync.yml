name: "투자자료 RAG 동기화"

on:
  schedule:
    # 매일 07:30 KST = UTC 22:30
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-investment-rag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Build digest and sync documents
        working-directory: scripts/automation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          WATCHLIST_PUBLISHED_CSV_URL: ${{ vars.WATCHLIST_PUBLISHED_CSV_URL }}
          INVESTMENT_RAG_MODEL: ${{ vars.INVESTMENT_RAG_MODEL }}
          INVESTMENT_OCR_MODEL: ${{ vars.INVESTMENT_OCR_MODEL }}
          INVESTMENT_VECTOR_STORE_ID: ${{ vars.INVESTMENT_VECTOR_STORE_ID }}
          INVESTMENT_VECTOR_STORE_NAME: ${{ vars.INVESTMENT_VECTOR_STORE_NAME }}
        run: python investment_rag_sync.py --generate-digest

      - name: Commit sync state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/investment_rag; then
            exit 0
          fi

          git add data/investment_rag
          git commit -m "Sync investment RAG state"
          git push
