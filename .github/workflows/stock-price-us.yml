name: "태스크2-1: 미국장 가격 변동 알림"

on:
  schedule:
    # 새벽 1회 (00:00 KST 평일 = UTC 15:00 일~목)
    - cron: "0 15 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stock-price-us:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/automation/requirements.txt

      - name: Check US stock prices
        working-directory: scripts/automation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          WATCHLIST_PUBLISHED_CSV_URL: ${{ vars.WATCHLIST_PUBLISHED_CSV_URL }}
          TELEGRAM_MEMORY_BRIDGE_URL: ${{ vars.TELEGRAM_MEMORY_BRIDGE_URL }}
          TELEGRAM_MEMORY_BRIDGE_TOKEN: ${{ secrets.TELEGRAM_MEMORY_BRIDGE_TOKEN }}
          TELEGRAM_MEMORY_SOURCE: "stock-price-us"
        run: python stock_price.py --market us
